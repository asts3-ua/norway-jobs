name: 🇳🇴 Norway Jobs Daily

on:
  schedule:
    # Cada día a las 8:00 AM hora española (7:00 UTC en verano)
    - cron: '0 7 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  fetch-and-send:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Validate required secrets
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -z "$GMAIL_USER" ] || [ -z "$GMAIL_APP_PASSWORD" ]; then
            echo "ERROR: Missing required secrets (GMAIL_USER and/or GMAIL_APP_PASSWORD)."
            exit 1
          fi
          echo "Secrets validation OK"

      - name: Run job scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python -u scraper.py

      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-scraper-log
          path: job_scraper.log

      - name: Upload email preview
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-email-preview
          path: job_email_preview.html